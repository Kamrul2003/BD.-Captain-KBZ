
<!DOCTYPE html>
<html lan="en">
  <head>
        <meta charset="UTF-8">
    <meta http-equiv="X-UA-compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> user signup Page </title>
    <link rel="stylesheet" type="text/css" href="Login.css"/>
  </head> 
  <body>
    <h1>Wellcome back</h1>
    <div id="login-form" class="registeration-form">
    <h1>Sign-in</h1>
    <p>Sign-in with your right information</p>
    </br></br>
    
    <input type="text"class="input" id="username" placeholder="Email address" required>
    <input type="password"class="input" id="password" placeholder="Password" required>
    </br></br>
    <button type="submit" onclick="login()">Login</button></br><br>
    <div class="error" id="error"></div>
    </br>
</div>

<script>
    // Hardcoded user data
    const users = [
      { username: "user1", password: "pass1" },
      { username: "user2", password: "pass2" },
      { username: "user3", password: "pass3" },
      { username: "Kbz", password: "kk" },
      { username: "kbzmidea05@gmail.com", password: "mkmk" },
    ];

    function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const errorDiv = document.getElementById("error");

      // Clear previous error messages
      errorDiv.textContent = "";

      // Check if user exists
      const user = users.find(
        (user) => user.username === username && user.password === password
      );

      if (user) {
        window.location.href = 'ahp.html';
      } else {
        errorDiv.textContent = "Invalid username or password.";
      }
    }
  </script>



</body>
</html>
