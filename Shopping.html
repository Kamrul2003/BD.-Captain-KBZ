<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit to WhatsApp</title>
</head>
<body>
    <h1>Send Data to WhatsApp</h1>
    <form id="whatsappForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br>
        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>
        <br>
        <button type="submit">Send to WhatsApp</button>
    </form>

    <script>
        document.getElementById("whatsappForm").addEventListener("submit", function (e) {
            e.preventDefault();

            // Get form data
            const app = "STARMAKER";
            const name = document.getElementById("name").value;
            const message = document.getElementById("message").value;

            // Format WhatsApp URL
            const phoneNumber = "+8801612098994"; // Replace with the recipient's phone number
            const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(
                `${app}<br> Name: ${name}<br> Message: ${message}`
            )}`;

            // Open WhatsApp URL
            window.open(whatsappURL, "_blank");

            // Redirect to another site
            setTimeout(() => {
                window.location.href = "https://kamrul2003.github.io/BD.-Captain-KBZ/dashboard.html"; // Replace with the desired site
            }, 0.001); // Delay to allow WhatsApp to open
        });
    </script>
</body>
</html>
